<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app"></div>
  <script src="src/supabase.js"></script>
  <script src="src/popup.js"></script>
  <script>
    // Fallback if scripts fail to execute
    setTimeout(() => {
      const app = document.getElementById('app');
      if (!app.children.length || app.innerHTML.trim() === '') {
        app.innerHTML = '<div style="padding:20px;color:#ef4444;font-size:11px">Scripts failed to load. Right-click this popup → Inspect to see console errors.</div>';
      }
    }, 2000);
  </script>
</body>
</html>
